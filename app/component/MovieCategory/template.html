<section class="category-section" style="background-image: url('{{backgroundImage}}')">
  <div class="category-section__overlay">

    <div class="category-section__header">
      <p class="category-section__label">SÉLECTION</p>
      <h2 class="category-section__title">{{categoryName}}</h2>
      <p class="category-section__description">{{description}}</p>
    </div>

    <div class="category-section__movies">
      {{movies}}{{moreCard}}
    </div>

    <div class="category-section__footer">
      <button class="category-section__btn" onclick="C.handlerGroup('{{categoryName}}')">Voir toute la sélection ({{totalCount}} films)</button>
    </div>

  </div>
</section>
