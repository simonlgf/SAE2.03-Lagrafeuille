<!DOCTYPE html>
<html lang="fr">
  <head>
    <title>SAE2.03 APP</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./component/Movie/style.css" />
    <link rel="stylesheet" href="./component/MovieDetail/style.css" />
    <link rel="stylesheet" href="./component/MovieCategory/style.css" />
  </head>

  <body>
    <header id="header"></header>

    <section id="content"></section>

    <script type="module">
      import { NavBar } from "./component/NavBar/script.js";
      import { Movie } from "./component/Movie/script.js";
      import { DataMovie } from "./data/dataMovie.js";
      import { MovieDetail } from "./component/MovieDetail/script.js";

      // Controleur
      // Rappel, écrire window.C plutôt que let C est nécessaire pour tester depuis la console du navigateur
      // Une fois l'application terminée, on pourrait remettre let C.
      window.C = {};

      /**
       * Récupère et affiche la liste des films disponibles
       */
      C.handlerHome = async function () {
        let movies = await DataMovie.requestMovies();
        let moviesByCategory = C.groupMoviesByCategory(movies);
        V.renderMoviesByCategory(moviesByCategory);
      };

      C.groupMoviesByCategory = function(movies){
          let tab_group = {};
          for(let movie of movies){
            let category = movie.category || 'Sans catégorie';
            if(!tab_group[category]) {
              tab_group[category] = [];
            }
            tab_group[category].push(movie);
          }
          return tab_group;
        }

        


      // TODO ITÉRATION 3 : Ajouter la fonction C.handlerDetail(movieId)
      // Cette fonction doit :
      // 1. Récupérer les détails du film via DataMovie.requestMovieDetails(movieId)
      // 2. Afficher les détails du film via V.renderMovieDetail(movieDetails)
      C.handlerDetail = async function (movieId) {
        let movieDetails = await DataMovie.requestMovieDetails(movieId);
        V.renderMovieDetail(movieDetails);
      };

      C.handlerAbout = function () {
        alert(
          "Ceci est une base de projet pour la SAE2.03 édition 2025. Bonne chance !"
        );
      };

      C.start = function () {
        V.renderNavBar("C.handlerHome()", "C.handlerAbout()");
        C.handlerHome(); // Affiche les films au démarrage
      };

      // Vue (contient tout ce qui est relatif à l'affichage)
      window.V = {};

      /**
       * V.renderNavBar
       *
       * Cette fonction est responsable de l'affichage de la barre de navigation (NavBar).
       * Elle sélectionne l'élément HTML avec l'ID "header" et y insère le contenu
       * formaté par le composant NavBar.
       */
      V.renderNavBar = function (hHome, hAbout) {
        let header = document.querySelector("#header");
        header.innerHTML = NavBar.format(hAbout, hHome);
      };

      /**
       * V.renderMovies
       *
       * Affiche la liste des films dans la section #content
       * Si aucun film n'est disponible, affiche un message
       */
      V.renderMovies = function (movies) {
        let content = document.querySelector("#content");
        
        if (!movies || movies.length === 0) {
          content.innerHTML = "<p class='empty-message'>Aucun film disponible pour le moment.</p>";
          return;
        }

        // TODO ITÉRATION 3 : Passer une fonction handler qui inclut l'ID du film
        // Chaque film doit être cliquable et appeler C.handlerDetail(ID_DU_FILM)
        // Movie.format() reçoit un second paramètre handlerClick
        // Ce paramètre doit contenir la fonction onclick avec l'ID du film
        C.handlerDetailClick = function (movieId){
          return `onclick="C.handlerDetail(${movieId})"`;
        }
        
        
        let moviesHtml = Movie.format(movies);


        
        // Crée un conteneur avec une grille pour afficher les films
        let html = `
          <div class="movies-container">
            ${moviesHtml}
          </div>
        `;
        
        content.innerHTML = html;
      };



            V.renderMoviesByCategory = function(moviesbyCat)
        {
          let section = document.querySelector("#content")
          let html = "";
          for(let category in moviesbyCat)
        {
          let movies = moviesbyCat[category];
          let moviesHtml = Movie.format(movies);
          html += `
          <section class="category-section">
            <h2 class="category-title">${category}</h2>
            <div class="category-movies">
              ${moviesHtml}
            </div>
          </section>
          `;
         section.innerHTML = html;
        }
        }





      // TODO ITÉRATION 3 : Ajouter la fonction V.renderMovieDetail(movieDetails)
      // Cette fonction doit afficher les détails complets du film dans la section #content
      // Afficher : titre, affiche, description, réalisateur, année, catégorie, restrictions d'âge, et trailer
      // Le trailer doit être affiché via un iframe (https://www.youtube.com/embed/TRAILER_ID)
      V.renderMovieDetail = function (movieDetail) {
        let section = document.querySelector("#content");
        let movieDetailHtml = MovieDetail.format(movieDetail);
        let html = `
          <div class="movie-detail-container">
            ${movieDetailHtml}
          </div>
        `;
        section.innerHTML = html;
      };

      C.start(); // Démarre l'application
    </script>
  </body>
</html>
